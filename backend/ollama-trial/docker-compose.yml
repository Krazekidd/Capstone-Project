services:
  postgres:
    image: postgres:15-alpine
    container_name: ollama_postgres
    environment:
      POSTGRES_DB: ollama_chat
      POSTGRES_USER: ollama_user
      POSTGRES_PASSWORD: ollama_pass
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ollama_user -d ollama_chat"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
