<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym AI Recommender - Streaming</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏋️ Gym AI Recommender</h1>
            <p>Get Jamaican meal recommendations and fitness advice with real-time streaming</p>
        </header>

        <main>
            <!-- Recommendation Section -->
            <section class="recommendation-section">
                <h2>🍽️ Meal Recommendations</h2>
                <button id="getRecommendation" class="btn btn-primary">Get Jamaican Meal Recommendations</button>
                <div id="recommendationResult" class="result-box"></div>
            </section>

            <!-- Chat Section -->
            <section class="chat-section">
                <h2>💬 Fitness Chat</h2>
                <div class="chat-container">
                    <div id="chatMessages" class="messages"></div>
                    <div class="input-group">
                        <input type="text" id="chatInput" placeholder="Ask about fitness, nutrition, or Jamaican meals...">
                        <button id="sendChat" class="btn btn-secondary">Send</button>
                    </div>
                </div>
            </section>

            <!-- Chatbot Section -->
            <section class="chatbot-section">
                <h2>🤖 Smart Chatbot (with Memory)</h2>
                <div class="chatbot-container">
                    <div class="session-info">
                        <input type="text" id="sessionId" placeholder="Session ID (e.g., user123)" value="user123">
                        <button id="clearSession" class="btn btn-small">Clear Session</button>
                    </div>
                    <div id="chatbotMessages" class="messages"></div>
                    <div class="input-group">
                        <input type="text" id="chatbotInput" placeholder="Chat with memory-enabled assistant...">
                        <button id="sendChatbot" class="btn btn-secondary">Send</button>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>Powered by Ollama • Real-time streaming responses</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
