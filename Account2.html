<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Profile | B.A.D Fitness</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="account2.css">
    <script defer src="account.css"></script>


</head>

<body>

    <div class="header-banner">
        <div class="settings-dropdown">
            <button class="settings-btn">⋮</button>
            <div class="settings-menu">
                <div class="settings-item" onclick="toggleTheme()">Toggle Light/Dark</div>
                <div class="settings-item">Profile Settings</div>
                <div class="settings-item">Log Out</div>
            </div>
        </div>

    </div>

    <div class="container">

        <!-- ================= LEFT PANEL ================= -->
        <div class="profile-panel">
            <label class="profile-pic">
                <img id="profileImage" src="https://via.placeholder.com/150">
                <input type="file" id="imageUpload">
            </label>

            <h3 id="displayName">John Doe</h3>
            <div class="profile-info">
                Status: Active<br>
                Gym Start: Jan 2024<br>
                Birthday: May 15, 1998
            </div>
        </div>

        <!-- ================= RIGHT CONTENT ================= -->
        <div class="content">

            <!-- 1. PERSONAL INFO -->
            <div class="section">
                <h2>Personal Information</h2>
                <div class="grid-2">
                    <input type="text" placeholder="Full Name">
                    <input type="date">
                    <input type="email" placeholder="Email">
                    <input type="tel" placeholder="Phone Number">
                    <select>
                        <option>Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>
            </div>

            <!-- 2. TRACK PROGRESS -->
            <div class="section">
                <h2>Track Your Progress</h2>
                <div class="progress-container">

                    <div class="progress-left">
                        <div class="grid-2">
                            <input type="number" id="weight" placeholder="Weight (kg)">
                            <input type="number" id="height" placeholder="Height (cm)">
                            <input type="number" placeholder="Bust (cm)">
                            <input type="number" placeholder="Shoulder (cm)">
                            <input type="number" placeholder="Waist (cm)">
                            <input type="number" placeholder="Hip (cm)">
                            <input type="number" placeholder="Thigh (cm)">
                        </div>

                        <button onclick="calculateBMI()">Calculate BMI</button>
                        <div class="bmi-display" id="bmiResult">BMI: --</div>
                    </div>

                    <div class="body-visual" id="bodyVisual"></div>

                </div>
            </div>

            <!-- 3. MONTHLY REPORT -->
            <div class="section">
                <h2>Monthly Report</h2>
                <canvas id="progressChart"></canvas>
            </div>

            <!-- 4. NUTRI-AI -->
            <div class="section">
                <h2>Nutri-AI</h2>
                <div class="chat-box" id="chatBox"></div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="Ask for nutrition advice...">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>

            <!-- 5. BADGES -->
            <div class="section">
                <h2>Achievements</h2>
                <div class="badges">
                    <div class="badge">🔥 7 Day Streak</div>
                    <div class="badge">💪 30 Workouts</div>
                    <div class="badge">🏆 3 Month Consistency</div>
                    <div class="badge">🥗 Clean Eating Week</div>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
