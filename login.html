<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>B.A.D People Fitness | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        integrity="sha512-XBS0e+S4oW7Qp1r7qLqKw7bqvU3EKhYF8l3k7zRDEoiOiP4y5g7nEO+0P5g/6pFh1rU+U14Lf6xj0Cw+sm6l2w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="background-gradient"></div>

    <div class="login-container">
        <div class="login-card">

            <div class="login-left">
                <img src="images/triallogo.png" alt="B.A.D People Fitness Logo" class="logo">
                <h2>LOG IN</h2>
                <p>Log in to your account</p>
            </div>

            <div class="login-right">
                <form id="login-form">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>

                    <div class="options">
                        <label class="remember">
                            <input type="checkbox" id="remember">
                            <span class="checkmark"></span> Remember Me
                        </label>
                        <a href="#" class="forgot">Forgot Password?</a>
                    </div>

                    <button class="primary-btn" type="submit">Login</button>
                </form>

                <div class="divider"><span>or</span></div>

                <div class="social-login-circles">
                    <button class="social-circle google"><i class="fab fa-google"></i></button>
                    <button class="social-circle apple"><i class="fab fa-apple"></i></button>
                </div>


            </div>
        </div>

    </div>
    </div>

</body>

</html>
